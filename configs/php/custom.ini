; Custom PHP overrides for this project
; Location: /etc/php/8.1/apache2/conf.d/99-custom.ini (repeat for 7.4 if needed)
; After editing: sudo systemctl restart apache2

; Increase upload limits for typical CMS/app use (e.g. WordPress, Laravel uploads)
upload_max_filesize = 32M
post_max_size = 32M

; Reasonable execution limits to prevent runaway scripts
max_execution_time = 60
memory_limit = 256M

; Never expose PHP version in response headers (basic hardening)
expose_php = Off

; Enable error logging but hide errors from public output (production-safe)
display_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Timezone (adjust to your deployment region)
date.timezone = Asia/Kolkata