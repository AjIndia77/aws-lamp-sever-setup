# LAMP Project Virtual Host Configuration
# Location on server: /etc/apache2/sites-available/lamp-site.conf
# Enable with: sudo a2ensite lamp-site.conf && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName YOUR_DOMAIN_OR_PUBLIC_IP
    ServerAdmin admin@example.com
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Route PHP requests through PHP 8.1-FPM
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.1-fpm.sock|fcgi://localhost"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/lamp-site-error.log
    CustomLog ${APACHE_LOG_DIR}/lamp-site-access.log combined
</VirtualHost>

# Once SSL is configured (see docs/09-ssl-installation.md), Certbot will
# automatically generate a matching <VirtualHost *:443> block here.