# vsftpd configuration for this project
# Location: /etc/vsftpd.conf
# After editing: sudo systemctl restart vsftpd

listen=YES
listen_ipv6=NO

# Disable anonymous FTP entirely
anonymous_enable=NO

# Allow local system users (e.g. ftpuser) to log in
local_enable=YES
write_enable=YES

# Lock users into their home directory — prevents browsing the full filesystem
chroot_local_user=YES
allow_writeable_chroot=YES

# Passive mode port range (must also be opened in the EC2 Security Group if used)
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log

# Show a friendly banner instead of exposing version info
ftpd_banner=Welcome to the LAMP project FTP server.

# Idle/session timeouts
idle_session_timeout=600
data_connection_timeout=120